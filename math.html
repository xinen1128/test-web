<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>加减数学小游戏</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg,#89f7fe,#66a6ff);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #212529;
        }
        .game {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 16px 24px rgba(0,0,0,.2);
        }
        h1 { margin-top: 0; }
        .question { font-size: 2rem; margin: 16px 0; text-align: center; }
        .controls { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .controls button { padding: 10px 14px; border: none; border-radius: 8px; cursor: pointer; }
        .controls button:hover { opacity: .88; }
        input[type="number"] { width: 100%; padding: 10px 12px; font-size: 1.1rem; border: 2px solid #ccc; border-radius: 8px; }
        .message { margin-top: 14px; font-weight: bold; text-align: center; min-height: 24px; }
        .stats { margin-top: 20px; display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; }
        .stats div { background:#f1f3f5; border-radius:8px; padding:10px; text-align:center; }
    </style>
</head>
<body>
    <div class="game">
        <h1>加减数学小游戏</h1>
        <div class="controls">
            <button id="prevBtn">上一题</button>
            <button id="nextBtn">下一题</button>
            <button id="restartBtn" style="background:#f56a79; color:#fff;">重新开始</button>
        </div>
        <div class="question" id="question">正在生成题目...</div>
        <input type="number" id="answerInput" placeholder="输入答案" />
        <button id="checkBtn" style="margin-top:10px; width:100%; background:#198754; color:#fff;">提交答案</button>
        <div class="message" id="message"></div>
        <div class="stats">
            <div>当前题：<span id="currentIndex">0</span>/200</div>
            <div>答对：<span id="correctCount">0</span></div>
            <div>答错：<span id="incorrectCount">0</span></div>
            <div>正确率：<span id="accuracy">0%</span></div>
        </div>
    </div>
    <script>
        const TOTAL = 200;
        const questionEl = document.getElementById('question');
        const answerInput = document.getElementById('answerInput');
        const messageEl = document.getElementById('message');
        const currentIndexEl = document.getElementById('currentIndex');
        const correctCountEl = document.getElementById('correctCount');
        const incorrectCountEl = document.getElementById('incorrectCount');
        const accuracyEl = document.getElementById('accuracy');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const restartBtn = document.getElementById('restartBtn');
        const checkBtn = document.getElementById('checkBtn');

        let questions = [];
        let index = 0;
        let correctCount = 0;
        let incorrectCount = 0;

        function makeQuestions() {
            const arr = [];
            for (let i = 0; i < TOTAL; i++) {
                const a = Math.floor(Math.random() * 100);
                const b = Math.floor(Math.random() * 100);
                const op = Math.random() < 0.5 ? '+' : '-';
                const answer = op === '+' ? a + b : a - b;
                arr.push({ text: `${a} ${op} ${b} = ?`, answer });
            }
            return arr;
        }

        function refreshUI() {
            const q = questions[index];
            questionEl.textContent = q.text;
            currentIndexEl.textContent = index + 1;
            correctCountEl.textContent = correctCount;
            incorrectCountEl.textContent = incorrectCount;
            const totalAnswered = correctCount + incorrectCount;
            accuracyEl.textContent = totalAnswered === 0 ? '0%' : `${((correctCount / totalAnswered) * 100).toFixed(1)}%`;
            answerInput.value = '';
            answerInput.focus();
            messageEl.textContent = '';
        }

        function checkAnswer() {
            const inputVal = Number(answerInput.value);
            if (Number.isNaN(inputVal) || answerInput.value === '') {
                messageEl.textContent = '请先输入一个数字答案！';
                messageEl.style.color = '#d63384';
                return;
            }
            const correct = questions[index].answer;
            if (inputVal === correct) {
                messageEl.textContent = '你真是我聪明的臭毛毛~';
                messageEl.style.color = '#198754';
                correctCount++;
            } else {
                messageEl.textContent = '你是笨猪吧！ 正确答案是：' + correct;
                messageEl.style.color = '#dc3545';
                incorrectCount++;
            }
            refreshUI();
        }

        function prevQuestion() {
            if (index > 0) {
                index--;
                refreshUI();
            }
        }

        function nextQuestion() {
            if (index < TOTAL - 1) {
                index++;
                refreshUI();
            }
        }

        function startGame() {
            questions = makeQuestions();
            index = 0;
            correctCount = 0;
            incorrectCount = 0;
            refreshUI();
        }

        prevBtn.addEventListener('click', prevQuestion);
        nextBtn.addEventListener('click', nextQuestion);
        checkBtn.addEventListener('click', checkAnswer);
        restartBtn.addEventListener('click', startGame);

        startGame();
    </script>
</body>
</html>
